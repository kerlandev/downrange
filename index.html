let angleHoldFrames=0,powerHoldFrames=0;
document.addEventListener('keydown',e=>{
  if(audioCtx.state==='suspended')audioCtx.resume().then(startAmbient);else startAmbient();
  if(e.key==='Escape'){closeAllOverlays();return;}
  if(e.key==='r'||e.key==='R'){
    gotoLevel(currentLevel);return;
  }
  if(e.key==='['||e.key==='{'){gotoLevel(((currentLevel-2+NUM_LEVELS)%NUM_LEVELS)+1);return;}
  if(e.key===']'||e.key==='}'){gotoLevel((currentLevel%NUM_LEVELS)+1);return;}
  if(!e.repeat){
    keysDown[e.key]=true;
    if(state==='aiming'){
      // P2 has reversed left/right (Left increases angle, Right decreases) since they fire leftward
      const angSign=(gameMode==='2P'&&currentPlayer===2)?-1:1;
      if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
        const before=cannon.angle;
        const d=e.key==='ArrowLeft'?-0.5:0.5;
        cannon.angle=clamp(cannon.angle+d*angSign,-86,-2);
        if(cannon.angle!==before){updateHUD();playClick();}
      }
      if(e.key==='ArrowUp')    {cannon.power=clamp(cannon.power+2,10,100);updateHUD();}
      if(e.key==='ArrowDown')  {cannon.power=clamp(cannon.power-2,10,100);updateHUD();}
    }
    if(e.key==='v'||e.key==='V'){
      if(state==='aiming'){
        const sx1=getSavedViewX(),sy1=getSavedViewY();
        const tvX1=sx1!==null?sx1:clamp(getScoutX(),0,WW-VW);
        const tvY1=sy1!==null?sy1:0;
        reconTween={active:true,t:0,fromX:cam.x,fromY:cam.y,toX:tvX1,toY:tvY1,dir:'to',returnState:'',speed:1/60};
        state='recon';updateHUD();
      } else if(state==='recon'){
        const cannonX=clamp(cannon.wx-(cannon.facing===1?VW*0.16:VW*0.84),0,WW-VW);
        reconTween={active:true,t:0,fromX:cam.x,fromY:cam.y,toX:cannonX,toY:0,dir:'back',returnState:'aiming',speed:1/60};
        updateHUD();
      } else if(state==='firing'){
        const sx2v=getSavedViewX(),sy2v=getSavedViewY();
        const tvX2=sx2v!==null?sx2v:clamp(getScoutX(),0,WW-VW);
        const tvY2=sy2v!==null?sy2v:0;
        reconTween={active:true,t:0,fromX:cam.x,fromY:cam.y,toX:tvX2,toY:tvY2,dir:'to',returnState:'',speed:2/60};
        state='targetView';updateHUD();
      } else if(state==='targetView'){
        const sh=shells.find(s=>s.active)||shells[0];
        const trackX=sh?clamp(sh.wx-VW*0.42+camInflightPanX,0,WW-VW):cam.x;
        const trackY=sh?sh.wy-VH*0.44:cam.y;
        reconTween={active:true,t:0,fromX:cam.x,fromY:cam.y,toX:trackX,toY:trackY,dir:'back',returnState:'firing',speed:2/60};
        updateHUD();
      }
    }
    if((e.key===' '||e.key==='Enter')&&state==='aiming'){e.preventDefault();fireShell();}
    else if(e.key===' '&&state==='firing'&&(!splitUsed||!splitUsed2)){e.preventDefault();splitShell();}
    else if(e.key===' '&&state==='firing'&&splitUsed&&splitUsed2){e.preventDefault();
      const sx3=getSavedViewX(),sy3=getSavedViewY();
      const tvX3=sx3!==null?sx3:clamp(getScoutX(),0,WW-VW);
      const tvY3=sy3!==null?sy3:0;
      reconTween={active:true,t:0,fromX:cam.x,fromY:cam.y,toX:tvX3,toY:tvY3,dir:'to',returnState:'',speed:2/60};
      state='targetView';updateHUD();}
    else if(e.key===' '&&state==='targetView'&&splitUsed&&splitUsed2){e.preventDefault();
      const sh=shells.find(s=>s.active)||shells[0];
      const trackX=sh?clamp(sh.wx-VW*0.42+camInflightPanX,0,WW-VW):cam.x;
      const trackY=sh?sh.wy-VH*0.44:cam.y;
      reconTween={active:true,t:0,fromX:cam.x,fromY:cam.y,toX:trackX,toY:trackY,dir:'back',returnState:'firing',speed:2/60};
      updateHUD();}
    else if(e.key===' '&&state==='damage'){e.preventDefault();
      if(gameMode==='2P'&&!winner){switchTurn();}
      else{state='aiming';updateHUD();}
    }
  }
});
document.addEventListener('keyup',e=>{
  delete keysDown[e.key];
  if(e.key==='ArrowLeft'||e.key==='ArrowRight') angleHoldFrames=0;
  if(e.key==='ArrowUp'||e.key==='ArrowDown') powerHoldFrames=0;
});

function handleHeldAngle(){
  if(state!=='aiming') return;
  const lh=keysDown['ArrowLeft'],rh=keysDown['ArrowRight'];
  if(!lh&&!rh){angleHoldFrames=0;return;}
  angleHoldFrames++;
  if(angleHoldFrames<26) return;
  const spd=angleHoldFrames<65?0.55:angleHoldFrames<130?1.1:2.0;
  const angSign=(gameMode==='2P'&&currentPlayer===2)?-1:1;
  const before=cannon.angle;
  if(lh) cannon.angle=clamp(cannon.angle+(-spd)*angSign,-86,-2);
  if(rh) cannon.angle=clamp(cannon.angle+( spd)*angSign,-86,-2);
  if(cannon.angle!==before){
    updateHUD();
    // Throttle held clicks to every ~3 frames (~20/sec) — keeps it audible without ratcheting noise
    if(angleHoldFrames%3===0) playClick();
  }
}
function handleHeldPower(){
  if(state!=='aiming') return;
  const uh=keysDown['ArrowUp'],dh=keysDown['ArrowDown'];
  if(!uh&&!dh){powerHoldFrames=0;return;}
  powerHoldFrames++;
  if(powerHoldFrames<26) return;
  const spd=powerHoldFrames<65?0.55:powerHoldFrames<130?1.1:2.0;
  if(uh){cannon.power=clamp(cannon.power+spd,10,100);updateHUD();}
  if(dh){cannon.power=clamp(cannon.power-spd,10,100);updateHUD();}
}
function handleDamageView(){
  if(state!=='damage') return;
  const PAN=8;
  if(keysDown['ArrowLeft'])  cam.tx=Math.max(0,cam.tx-PAN);
  if(keysDown['ArrowRight']) cam.tx=Math.min(WW-VW,cam.tx+PAN);
  if(keysDown['ArrowUp'])    cam.ty-=PAN;
  if(keysDown['ArrowDown'])  cam.ty+=PAN;
}
function handleInflightView(){
  if(state!=='targetView'||reconTween.active) return;
  const PAN=12;
  let panned=false;
  if(keysDown['ArrowLeft'])  {cam.tx=Math.max(0,cam.tx-PAN);cam.x=cam.tx;cam.vx=0;panned=true;}
  if(keysDown['ArrowRight']) {cam.tx=Math.min(WW-VW,cam.tx+PAN);cam.x=cam.tx;cam.vx=0;panned=true;}
  if(keysDown['ArrowUp'])    {cam.ty-=PAN;cam.y=cam.ty;cam.vy=0;panned=true;}
  if(keysDown['ArrowDown'])  {cam.ty+=PAN;cam.y=cam.ty;cam.vy=0;panned=true;}
  if(panned) setSavedView(cam.x,cam.y);
}
function handleReconExplore(){
  if(state!=='recon'||reconTween.active) return;
  const PAN=8;
  let panned=false;
  if(keysDown['ArrowLeft'])  {cam.tx=Math.max(0,cam.tx-PAN);cam.x=cam.tx;cam.vx=0;panned=true;}
  if(keysDown['ArrowRight']) {cam.tx=Math.min(WW-VW,cam.tx+PAN);cam.x=cam.tx;cam.vx=0;panned=true;}
  if(keysDown['ArrowUp'])    {cam.ty-=PAN;cam.y=cam.ty;cam.vy=0;panned=true;}
  if(keysDown['ArrowDown'])  {cam.ty+=PAN;cam.y=cam.ty;cam.vy=0;panned=true;}
  if(panned) setSavedView(cam.x,cam.y);
}
function handleLevelCompleteView(){
  // Camera remains interactive after a win — players can keep panning.
  if(state!=='levelComplete') return;
  const PAN=8;
  if(keysDown['ArrowLeft'])  {cam.tx=Math.max(0,cam.tx-PAN);cam.x=cam.tx;cam.vx=0;}
  if(keysDown['ArrowRight']) {cam.tx=Math.min(WW-VW,cam.tx+PAN);cam.x=cam.tx;cam.vx=0;}
  if(keysDown['ArrowUp'])    {cam.ty-=PAN;cam.y=cam.ty;cam.vy=0;}
  if(keysDown['ArrowDown'])  {cam.ty+=PAN;cam.y=cam.ty;cam.vy=0;}
}

// ── Main loop — fixed timestep (1000/60 ms) decoupled from refresh rate ──
// Game logic ticks at exactly 60 Hz regardless of monitor refresh. Render
// runs once per requestAnimationFrame. Multiple updates per render catch up
// for slow frames, capped at MAX_STEPS to prevent spiral-of-death.
const FIXED_DT = 1000/60;
const MAX_STEPS = 3;
let lastFrameTime = performance.now();
let accumulator = 0;

function update(){
  // Recoil: snap on fire, return twice as slow as original
  for(const c of [cannonP1,cannonP2]){
    if(c.recoil>0) c.recoil=Math.max(0,c.recoil*0.988);
    if(c.flashBurst>0) c.flashBurst=Math.max(0,c.flashBurst-1.2);
  }

  handleHeldAngle();
  handleHeldPower();
  handleDamageView();
  handleInflightView();
  handleReconExplore();
  handleLevelCompleteView();
  updateFX();
  updateMuzzleSmoke();
  updateShockwaves();
  updateSplitBursts();
  updateSmokeParticles();

  // Camera — no idle noise; track both axes during flight
  if(camDwell>0){
    camDwell--;
    cam.tx=clamp(cannon.wx-(cannon.facing===1?VW*0.16:VW*0.84),0,WW-VW);
    cam.ty=0;
  } else if(state==='aiming'){
    cam.tx=clamp(cannon.wx-(cannon.facing===1?VW*0.16:VW*0.84),0,WW-VW);
    cam.ty=0;
  }
  if(reconTween.active){
    reconTween.t=Math.min(reconTween.t+(reconTween.speed||1/60),1);
    const te=reconTween.t;
    const ease=te<0.5?2*te*te:-1+(4-2*te)*te;
    cam.x=reconTween.fromX+(reconTween.toX-reconTween.fromX)*ease;
    cam.y=reconTween.fromY+(reconTween.toY-reconTween.fromY)*ease;
    cam.tx=cam.x;cam.ty=cam.y;cam.vx=0;cam.vy=0;
    if(reconTween.t>=1){
      reconTween.active=false;
      if(reconTween.dir==='back'){state=reconTween.returnState||'aiming';updateHUD();}
    }
  }
  const tracking=(state==='firing'&&camDwell<=0&&shells.some(s=>s.active));
  cam.update(tracking);

  updateShells();updateBlocks();updateParticles();
  const statusEl=document.getElementById('status');
  if(state==='firing'&&!hasEverSplit&&!splitUsed){
    splitHintFrame++;
    const hintAge=splitHintFrame-120;
    if(hintAge>=0&&hintAge<120){
      const red=hintAge%30<18;
      if(statusEl){statusEl.style.color=red?'#ff2222':'#cccccc';statusEl.style.fontWeight=red?'bold':'normal';}
    } else {
      if(statusEl){statusEl.style.color='#cccccc';statusEl.style.fontWeight='normal';}
    }
  } else {
    if(statusEl){statusEl.style.color='#cccccc';statusEl.style.fontWeight='normal';}
  }
  if(gameMode==='2P'&&!winner) checkWin();
}

function render(){
  // ── Render ──────────────────────────────────────────────────────
  cx.save();
  cx.translate(sFX.sx,sFX.sy); // screen shake

  cx.save();
  cx.translate(0,-cam.y); // vertical scroll to follow projectile

  drawBG();

  // Parallax background layers — back to front
  for(const CL of CIRRUS_LAYERS) drawLayer(CL.factor,()=>{for(const c of CL.clouds) drawCirrus(c,CL.alpha);});
  drawLayer(OCEAN_FACTOR,drawOcean,48);
  drawLayer(FAR_MTN.factor,()=>{drawMtnLayer(FAR_MTN,-1);for(const p of FAR_MTN_PINES) drawBgPine(p.wx,p.wy,p.h,FAR_PINE_STYLE.fill,FAR_PINE_STYLE.stroke);},75);
  for(let li=0;li<MTN_LAYERS.length;li++){
    const L=MTN_LAYERS[li];
    drawLayer(L.factor,()=>drawMtnLayer(L,li),[60,45,30,15][li]);
  }
  for(const CL of CLOUD_LAYERS) drawLayer(CL.factor,()=>{for(const c of CL.clouds) drawCloud(c,CL.alpha);});

  drawGround();
  drawBlocks();
  drawParticles();
  drawSmokeParticles();
  drawShockwaves();
  drawTrajectory();
  if(gameMode==='2P'){
    const inactive=(currentPlayer===1)?cannonP2:cannonP1;
    inactive.draw();
  }
  cannon.draw();
  drawShells();
  drawSplitBursts();

  cx.restore(); // end vertical scroll

  drawMinimap(); // fixed position — outside cam.y offset

  cx.restore(); // end screen shake

  // Brightness flash overlay (full canvas, outside all transforms)
  if(sFX.bright>0.01){
    cx.fillStyle=`rgba(255,255,255,${sFX.bright*0.65})`;
    cx.fillRect(0,0,VW,VH);
  }

  // Corner HUD
  cx.save();
  cx.fillStyle='rgba(20,20,20,0.46)';cx.font='10px Courier New';cx.textAlign='left';
  cx.fillText(`∠${cannon.angle.toFixed(1)}°  PWR:${Math.round(cannon.power)}  SHOTS:${shotsUsed}`,10,16);
  cx.restore();

  if(state==='levelComplete'){
    cx.save();
    sRect(VW/2-205,VH/2-82,410,164,'rgba(245,244,238,0.94)','#333',2.2);
    cx.fillStyle='#111';cx.font='bold 22px Courier New';cx.textAlign='center';
    if(gameMode==='2P'&&winner){
      cx.fillText(`PLAYER ${winner} WINS`,VW/2,VH/2-30);
      cx.font='12px Courier New';cx.fillStyle='#555';
      cx.fillText('Press R to play again',VW/2,VH/2+6);
      cx.fillText('Press [ ] to change level',VW/2,VH/2+30);
    } else {
      cx.fillText('STRUCTURE DESTROYED',VW/2,VH/2-30);
      cx.font='12px Courier New';cx.fillStyle='#555';
      cx.fillText(`${shotsUsed} shot${shotsUsed!==1?'s':''} fired  ·  press R to play again`,VW/2,VH/2+6);
      cx.fillText('Press [ ] to change level',VW/2,VH/2+30);
    }
    cx.restore();
  }
}

function loop(now){
  requestAnimationFrame(loop);
  if(now===undefined) now=performance.now();
  let elapsed=now-lastFrameTime;
  lastFrameTime=now;
  // Clamp huge gaps (tab switches, sleep) so we don't try to catch up minutes of state
  if(elapsed>250) elapsed=250;
  accumulator+=elapsed;
  let steps=0;
  while(accumulator>=FIXED_DT&&steps<MAX_STEPS){
    update();
    accumulator-=FIXED_DT;
    steps++;
  }
  // Spiral-of-death prevention: if we maxed out, drop the leftover backlog
  if(steps>=MAX_STEPS) accumulator=0;
  render();
}

function drawLayer(f,fn,yOff=0){cx.save();cx.translate(-cam.x*f,cam.y*(1-f)-yOff);fn();cx.restore();}

buildLevel(1);updateHUD();loop();

// MOBILE OVERLAY — touch controls for coarse-pointer (mobile) devices
// All code below is purely additive; zero desktop side effects.
// ═══════════════════════════════════════════════════════════════════

// MOBILE OVERLAY — detect touch-primary input via media query (no UA sniffing)
let isTouchPrimary = window.matchMedia('(pointer: coarse) and (hover: none)').matches;

// MOBILE OVERLAY — scale the entire #wrap via CSS transform to letterbox-fit landscape viewport
function mobScaleWrap() {
  const wrap = document.getElementById('wrap');
  if (!isTouchPrimary) {
    wrap.style.transform = '';
    wrap.style.position = '';
    wrap.style.left = '';
    wrap.style.top = '';
    document.body.classList.remove('mob-touch');
    return;
  }
  document.body.classList.add('mob-touch');
  // Reset transform first so offsetHeight gives natural dimensions
  wrap.style.transform = '';
  wrap.style.position = '';
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const natW = 960; // wrap is always 960px wide (canvas determines it)
  const natH = wrap.offsetHeight; // natural height (canvas 480 + topbar if 2P + ui)
  const scale = Math.min(vw / natW, vh / natH);
  const offX = Math.max(0, (vw - natW * scale) / 2);
  const offY = Math.max(0, (vh - natH * scale) / 2);
  wrap.style.transformOrigin = 'top left';
  wrap.style.transform = `scale(${scale})`;
  wrap.style.position = 'absolute';
  wrap.style.left = offX + 'px';
  wrap.style.top  = offY + 'px';
}

// MOBILE OVERLAY — check orientation; show rotate prompt if portrait on touch device
function mobCheckOrientation() {
  if (!isTouchPrimary) return;
  const isPortrait = window.innerHeight > window.innerWidth;
  document.getElementById('mobRotateOverlay').classList.toggle('show', isPortrait);
  if (!isPortrait) mobScaleWrap();
}

// MOBILE OVERLAY — hold-to-repeat: fires actionFn immediately, then at decreasing intervals
// Initial delay 350ms, reduces 30ms each step, minimum 50ms — reaches full speed ~2 seconds.
function mobHoldRepeat(actionFn, startInterval) {
  startInterval = startInterval || 200;
  actionFn();
  let interval = startInterval;
  let tid = null;
  function repeat() {
    actionFn();
    interval = Math.max(12, interval - 50);
    tid = setTimeout(repeat, interval);
  }
  tid = setTimeout(repeat, interval);
  return function cancel() { clearTimeout(tid); tid = null; };
}

// MOBILE OVERLAY fix3 — one-time passive document touchstart to unlock AudioContext.
// Uses passive:true so it never blocks the browser's audio-gesture unlock mechanism,
// and fires before any button-level handler so audio is ready for the first action.
document.addEventListener('touchstart', function mobAudioUnlock() {
  if (audioCtx.state === 'suspended') audioCtx.resume().then(startAmbient);
  else startAmbient();
  document.removeEventListener('touchstart', mobAudioUnlock);
}, { passive: true });

// MOBILE OVERLAY — bind hold-to-repeat on touchstart/touchend
function mobBindHold(el, actionFn, startInterval) {
  if (!el) return;
  let cancel = null;
  // passive:true — lets iOS audio unlock fire without gesture-token interference
  el.addEventListener('touchstart', function() {
    if (audioCtx.state === 'suspended') audioCtx.resume().then(startAmbient); else startAmbient();
    cancel = mobHoldRepeat(actionFn, startInterval);
  }, { passive: true });
  // touchmove with preventDefault stops scroll while the finger is held on a button
  el.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
  el.addEventListener('touchend',    function() { if (cancel) { cancel(); cancel = null; } });
  el.addEventListener('touchcancel', function() { if (cancel) { cancel(); cancel = null; } });
}

// MOBILE OVERLAY — bind single tap (touchstart only, no hold repeat)
function mobBindTap(el, actionFn) {
  if (!el) return;
  // passive:true — same audio-unlock reasoning as mobBindHold
  el.addEventListener('touchstart', function() {
    if (audioCtx.state === 'suspended') audioCtx.resume().then(startAmbient); else startAmbient();
    actionFn();
  }, { passive: true });
  // touchmove preventDefault stops accidental scroll when tapping
  el.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
}

// MOBILE OVERLAY — action: angle adjust (delta applied with existing angSign logic)
// +0.5 = same as ArrowRight keydown; -0.5 = same as ArrowLeft keydown
function mobAngle(d) {
  if (state !== 'aiming') return;
  const angSign = (gameMode === '2P' && currentPlayer === 2) ? -1 : 1;
  const before = cannon.angle;
  cannon.angle = clamp(cannon.angle + d * angSign, -86, -2);
  if (cannon.angle !== before) { updateHUD(); playClick(); }
}

// MOBILE OVERLAY — action: power adjust (+2 / -2 matching keyboard repeat step)
function mobPower(d) {
  if (state !== 'aiming') return;
  cannon.power = clamp(cannon.power + d, 10, 100);
  updateHUD();
}

// MOBILE OVERLAY — action: pan camera during damage view (same as ArrowLeft/Right held)
function mobScroll(dir) {
  if (state !== 'damage') return;
  cam.tx = Math.max(0, Math.min(WW - VW, cam.tx + dir * 8));
}

// MOBILE OVERLAY — action: fire (same as Space/fireBtn in aiming state)
function mobFire() {
  if (state === 'aiming') fireShell();
}

// MOBILE OVERLAY — action: scout / return (same as V key)
function mobScout() {
  if (state === 'aiming') {
    const sx = getSavedViewX(), sy = getSavedViewY();
    const tvX = sx !== null ? sx : clamp(getScoutX(), 0, WW - VW);
    const tvY = sy !== null ? sy : 0;
    reconTween = { active:true, t:0, fromX:cam.x, fromY:cam.y, toX:tvX, toY:tvY, dir:'to', returnState:'', speed:1/60 };
    state = 'recon'; updateHUD();
  } else if (state === 'recon') {
    const cx2 = clamp(cannon.wx - (cannon.facing === 1 ? VW * 0.16 : VW * 0.84), 0, WW - VW);
    reconTween = { active:true, t:0, fromX:cam.x, fromY:cam.y, toX:cx2, toY:0, dir:'back', returnState:'aiming', speed:1/60 };
    updateHUD();
  }
}

// MOBILE OVERLAY — action: split shell (same as Space in firing state)
function mobSplit() {
  if (state === 'firing' && (!splitUsed || !splitUsed2)) {
    splitShell();
    mobUpdateOverlay(); // refresh split-button disabled state immediately
  }
}

// MOBILE OVERLAY — action: view target / return to tracking (same as V in firing/targetView)
function mobViewTarget() {
  if (state === 'firing') {
    const sx = getSavedViewX(), sy = getSavedViewY();
    const tvX = sx !== null ? sx : clamp(getScoutX(), 0, WW - VW);
    const tvY = sy !== null ? sy : 0;
    reconTween = { active:true, t:0, fromX:cam.x, fromY:cam.y, toX:tvX, toY:tvY, dir:'to', returnState:'', speed:2/60 };
    state = 'targetView'; updateHUD();
  } else if (state === 'targetView') {
    const sh = shells.find(function(s){ return s.active; }) || shells[0];
    const trackX = sh ? clamp(sh.wx - VW * 0.42 + camInflightPanX, 0, WW - VW) : cam.x;
    const trackY = sh ? sh.wy - VH * 0.44 : cam.y;
    reconTween = { active:true, t:0, fromX:cam.x, fromY:cam.y, toX:trackX, toY:trackY, dir:'back', returnState:'firing', speed:2/60 };
    updateHUD();
  }
}

// MOBILE OVERLAY — action: continue / next player's turn (same as Space in damage state)
function mobContinue() {
  if (state === 'damage') {
    if (gameMode === '2P' && !winner) { switchTurn(); }
    else { state = 'aiming'; updateHUD(); }
  }
}

mobBindHold(document.getElementById('mob-p2-minus-power'),function(){ mobPower(-2); });

// P1 angle (+ANGLE left = ArrowRight = +0.5; -ANGLE right = ArrowLeft = -0.5)
mobBindHold(document.getElementById('mob-p1-plus-angle'),  function(){ mobAngle(+0.5); });
mobBindHold(document.getElementById('mob-p1-minus-angle'), function(){ mobAngle(-0.5); });
// P2 angle (SWAPPED: -ANGLE left = ArrowLeft = -0.5; +ANGLE right = ArrowRight = +0.5)
mobBindHold(document.getElementById('mob-p2-minus-angle'), function(){ mobAngle(-0.5); });
mobBindHold(document.getElementById('mob-p2-plus-angle'),  function(){ mobAngle(+0.5); });

// Damage scroll hold-to-repeat
mobBindHold(document.getElementById('mob-scroll-left'),  function(){ mobScroll(-1); }, 12);
mobBindHold(document.getElementById('mob-scroll-right'), function(){ mobScroll(+1); }, 12);

// MOBILE OVERLAY — bind all tap buttons
mobBindTap(document.getElementById('mob-p1-scout'),       mobScout);
mobBindTap(document.getElementById('mob-p1-fire'),        mobFire);
mobBindTap(document.getElementById('mob-p2-scout'),       mobScout);
mobBindTap(document.getElementById('mob-p2-fire'),        mobFire);
mobBindTap(document.getElementById('mob-p1-split'),       mobSplit);
mobBindTap(document.getElementById('mob-p1-view-target'), mobViewTarget);
mobBindTap(document.getElementById('mob-p2-split'),       mobSplit);
mobBindTap(document.getElementById('mob-p2-view-target'), mobViewTarget);
mobBindTap(document.getElementById('mobDamageContinue'),  mobContinue);
mobBindTap(document.getElementById('mobPriorLevel'),  function(){ gotoLevel(((currentLevel - 2 + NUM_LEVELS) % NUM_LEVELS) + 1); });
mobBindTap(document.getElementById('mobNextLevel'),   function(){ gotoLevel((currentLevel % NUM_LEVELS) + 1); });
mobBindTap(document.getElementById('mobPlayAgain'),   function(){ gotoLevel(currentLevel); });
mobBindTap(document.getElementById('mobMenuBtn'), function() {
  var m = document.getElementById('menuOverlay');
  var open = m.classList.contains('hidden');
  closeAllOverlays();
  if (open) m.classList.remove('hidden');
});

// MOBILE OVERLAY — show/hide correct button groups based on current game state
function mobUpdateOverlay() {
  if (!isTouchPrimary) return;
  document.getElementById('mobileOverlay').classList.add('mob-active');

  var isReady    = (state === 'aiming' || state === 'recon');
  var isInflight = (state === 'firing' || state === 'targetView');
  var isDamage   = (state === 'damage');
  var isGameOver = (state === 'levelComplete');

  // Determine which ready cluster is active
  var showP1 = isReady && (gameMode === '1P' || currentPlayer === 1);
  var showP2 = isReady &&  gameMode === '2P' && currentPlayer === 2;
  document.getElementById('mobReadyP1').style.display = showP1 ? '' : 'none';
  document.getElementById('mobReadyP2').style.display = showP2 ? '' : 'none';

  // In-flight: P1/1P fires from left so controls float right; P2 controls float left
  var inflP1 = isInflight && (gameMode === '1P' || currentPlayer === 1);
  var inflP2 = isInflight &&  gameMode === '2P' && currentPlayer === 2;
  document.getElementById('mobInflightP1').style.display = inflP1 ? '' : 'none';
  document.getElementById('mobInflightP2').style.display = inflP2 ? '' : 'none';

  // Split availability — disable when both splits already used
  var splitAvail = !splitUsed || !splitUsed2;
  document.getElementById('mob-p1-split').classList.toggle('mob-btn-disabled', !splitAvail);
  document.getElementById('mob-p2-split').classList.toggle('mob-btn-disabled', !splitAvail);

  // Damage view bar
  document.getElementById('mobDamage').style.display = isDamage ? '' : 'none';
  if (isDamage) {
    document.getElementById('mobDamageContinue').textContent =
      (gameMode === '2P' && !winner) ? "NEXT PLAYER'S TURN" : 'CONTINUE';
  }

  // Game over
  document.getElementById('mobGameOver').style.display = isGameOver ? '' : 'none';
}

// MOBILE OVERLAY — patch updateHUD so overlay refreshes on every game state change
var _mobOrigUpdateHUD = updateHUD;
updateHUD = function() {
  _mobOrigUpdateHUD();
  mobUpdateOverlay();
};

// MOBILE OVERLAY — patch setGameMode so overlay recomputes on 1P↔2P toggle
var _mobOrigSetGameMode = setGameMode;
setGameMode = function(m) {
  _mobOrigSetGameMode(m);
  if (isTouchPrimary) { mobScaleWrap(); mobUpdateOverlay(); }
};

// MOBILE OVERLAY — recompute on resize and orientation change
function mobRecompute() {
  isTouchPrimary = window.matchMedia('(pointer: coarse) and (hover: none)').matches;
  if (isTouchPrimary) {
    document.body.classList.add('mob-touch');
    mobCheckOrientation();
  } else {
    document.body.classList.remove('mob-touch');
    var wrap = document.getElementById('wrap');
    wrap.style.transform = '';
    wrap.style.position = '';
    wrap.style.left = '';
    wrap.style.top = '';
    document.getElementById('mobileOverlay').classList.remove('mob-active');
  }
}
window.addEventListener('resize',            mobRecompute);
window.addEventListener('orientationchange', mobRecompute);

// MOBILE OVERLAY — initial bootstrap
if (isTouchPrimary) {
  document.body.classList.add('mob-touch');
  // fix1: show correct buttons immediately — no layout computation required for visibility
  mobUpdateOverlay();
  // Defer canvas scaling until after browser layout pass (needs offsetHeight for scale math)
  requestAnimationFrame(function() {
    mobCheckOrientation();
    if (window.innerWidth >= window.innerHeight) {
      mobScaleWrap();
      mobUpdateOverlay(); // re-run after scaling so button groups reflect current state
    }
  });
}
</script>
</body>
</html>
